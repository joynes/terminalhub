<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Terminal</title>
  <link rel="stylesheet" href="xterm.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #0D0D1A; }
    /* Fixed positioning sizes against the viewport, bypassing height:100% inheritance
       which breaks when LAYER_TYPE_SOFTWARE is set on the Android WebView. */
    #terminal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="xterm.js"></script>
  <script src="xterm-addon-fit.js"></script>
  <script src="retro-theme.js"></script>
  <script>
    function androidLog(msg) {
      if (window.Android && window.Android.log) window.Android.log(msg);
      console.log('[xterm] ' + msg);
    }

    androidLog('init');

    const term = new Terminal({
      theme: retroTheme,
      fontFamily: 'Courier New, Courier, monospace',
      fontSize: 14,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 1000,
      scrollSensitivity: 3,
      fastScrollSensitivity: 10
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);

    const container = document.getElementById('terminal');
    term.open(container);
    androidLog('opened');

    // Disable autocapitalize/autocorrect on xterm's hidden textarea so Android IME
    // doesn't capitalise the first character of every input sequence.
    var _ta = container.querySelector('textarea');
    if (_ta) {
      _ta.setAttribute('autocapitalize', 'none');
      _ta.setAttribute('autocorrect', 'off');
      _ta.setAttribute('autocomplete', 'off');
      _ta.setAttribute('spellcheck', 'false');
    }

    function doFit() {
      try {
        const dims = fitAddon.proposeDimensions();
        if (dims && dims.cols > 0 && dims.rows > 0) {
          fitAddon.fit();
          androidLog('fit done cols=' + term.cols + ' rows=' + term.rows);
        }
      } catch(e) { androidLog('fit error: ' + e); }
    }

    // Fit whenever Android resizes the WebView
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(function() { doFit(); }).observe(container);
    }
    window.addEventListener('resize', doFit);

    // Write output from Android
    window.termWrite = function(data) {
      androidLog('write ' + data.length + ' chars');
      term.write(data);
    };

    // Fit from Android after layout.
    // proposeDimensions() reads clientHeight which may be 0 if the browser hasn't
    // reflowed yet. Poll with rAF + setTimeout until rows > 1 (up to 2 s).
    var _fitRetryTimer = null;
    window.termFit = function() {
      if (_fitRetryTimer) { clearTimeout(_fitRetryTimer); _fitRetryTimer = null; }
      var attempts = 0;
      function attempt() {
        requestAnimationFrame(function() {
          doFit();
          if (term.rows <= 1 && attempts < 20) {
            attempts++;
            _fitRetryTimer = setTimeout(attempt, 100);
          }
        });
      }
      attempt();
    };

    // Change font size
    window.termFontSize = function(delta) {
      const cur = term.options.fontSize || 14;
      term.options.fontSize = Math.max(8, Math.min(24, cur + delta));
      doFit();
    };

    // Send input to Android
    term.onData(function(data) {
      if (window.Android) window.Android.send(data);
    });

    // Copy selection to Android clipboard; if nothing selected, copy all visible lines.
    window.termCopySelection = function() {
      var text = term.getSelection();
      if (!text) {
        // Grab every line in the active buffer
        var lines = [];
        var buf = term.buffer.active;
        for (var i = 0; i < buf.length; i++) {
          lines.push(buf.getLine(i).translateToString(true));
        }
        text = lines.join('\n').trimEnd();
      }
      if (text && window.Android) window.Android.copyToClipboard(text);
    };

    // Tap to focus for keyboard input
    container.addEventListener('touchend', function() { term.focus(); });

    term.writeln('\x1b[1;32mAI TERMINAL HUB\x1b[0m');
    term.writeln('\x1b[2;37mConnecting...\x1b[0m');
    androidLog('ready');
  </script>
</body>
</html>
