<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Terminal</title>
  <link rel="stylesheet" href="xterm.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0D0D1A; overflow: hidden; }
    #terminal { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="xterm.js"></script>
  <script src="xterm-addon-fit.js"></script>
  <script src="retro-theme.js"></script>
  <script>
    function androidLog(msg) {
      if (window.Android && window.Android.log) window.Android.log(msg);
      console.log('[xterm] ' + msg);
    }

    androidLog('init');

    const term = new Terminal({
      theme: retroTheme,
      fontFamily: 'Courier New, Courier, monospace',
      fontSize: 14,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 5000
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);

    const container = document.getElementById('terminal');
    term.open(container);
    androidLog('opened');

    function doFit() {
      try {
        const dims = fitAddon.proposeDimensions();
        androidLog('fit dims=' + JSON.stringify(dims));
        if (dims && dims.cols > 0 && dims.rows > 0) {
          fitAddon.fit();
          androidLog('fit done cols=' + term.cols + ' rows=' + term.rows);
        }
      } catch(e) { androidLog('fit error: ' + e); }
    }

    // Fit whenever Android resizes the WebView
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(function() { doFit(); }).observe(container);
    }
    window.addEventListener('resize', doFit);

    // Write output from Android
    window.termWrite = function(data) {
      androidLog('write ' + data.length + ' chars');
      term.write(data);
    };

    // Fit from Android after layout
    window.termFit = function() { doFit(); };

    // Change font size
    window.termFontSize = function(delta) {
      const cur = term.options.fontSize || 14;
      term.options.fontSize = Math.max(8, Math.min(24, cur + delta));
      doFit();
    };

    // Send input to Android
    term.onData(function(data) {
      if (window.Android) window.Android.send(data);
    });

    // Tap to focus for keyboard input
    container.addEventListener('touchend', function() { term.focus(); });

    term.writeln('\x1b[1;32mAI TERMINAL HUB\x1b[0m');
    term.writeln('\x1b[2;37mConnecting...\x1b[0m');
    androidLog('ready');
  </script>
</body>
</html>
